[controls]
additional-paste-settings-hotkey=額外貼上快捷鍵
additional-paste-settings-hotkey-alt=額外貼上快捷鍵（Alt 模式）

[controls-description]
additional-paste-settings-hotkey=對大多數玩家來說，建議使用 SHIFT + 左鍵點擊。這個快捷鍵應固定用於把設定貼到實體上。
additional-paste-settings-hotkey-alt=對大多數玩家來說，建議使用 SHIFT + ALT + 左鍵點擊。此快捷鍵會將機械臂目前堆疊數量設為 1/2。

