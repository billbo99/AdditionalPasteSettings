[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings（擴充）

[mod-description]
AdditionalPasteSettings_CoreNest=此分支與原版 Additional Paste Settings 分開發佈於模組入口網站。\n\n為遊戲新增額外貼上設定（shift+右鍵 -> shift+左鍵），例如物流箱請求合併、固定請求倍率、調整原版 30 秒行為，以及允許把組裝機設定貼到機械臂並設定條件。