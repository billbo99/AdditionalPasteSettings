[mod-setting-description]
additional-paste-settings-options-smart_filters=智慧篩選：若從組裝機拉取，使用產物作為篩選，而非原料。
additional-paste-settings-options-disable_filters=停用篩選：停用對機械臂設定篩選（原版預設會把原料設為篩選）。
additional-paste-settings-options-inserter-filter-mode=選擇從組裝機貼上時機械臂篩選來源：僅產物、僅原料，或在兩者間切換。
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=從組裝機貼到車站時，依配方順序循環名稱：每個產物套用裝載格式再套用卸載格式；每個原料僅套用卸載。關閉時行為與箱子貼上相同。
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=需要上方選項。會在產物與原料之間插入一個車站名稱：把所有配方輸入合併成單一字串（適合 LTN 風格站點）。之後仍會對每個輸入執行一般卸載步驟。
additional-paste-settings-station_name_load=(__1__) 代表物品圖示，(__2__) 代表物品名稱
additional-paste-settings-station_name_unload=(__1__) 代表物品圖示，(__2__) 代表物品名稱
additional-paste-settings-station_name_ltn_all_inputs=(__1__) 代表所有輸入的 rich-text 圖示（空白分隔）；(__2__) 代表以逗號分隔的顯示名稱。僅在啟用 LTN 合併步驟時使用。
additional-paste-settings-se-rocket-landing-pad-name=(__1__) 代表物品圖示，(__2__) 代表物品名稱
additional-paste-settings-options-requester-multiplier-type=可選擇計算依據：物品堆疊量、配方消耗量，或製作時間。
additional-paste-settings-options-requester-multiplier-value=定義物流箱的請求量，取決於選擇的倍率類型。若選擇時間，則以製作秒數計算。
additional-paste-settings-options-inserter-multiplier-type=可選擇計算依據：物品堆疊量、配方消耗量，或製作時間。
additional-paste-settings-options-inserter-multiplier-value=定義物流箱的請求量，取決於選擇的倍率類型。若選擇時間，則以製作秒數計算。
additional-paste-settings-options-combinator-multiplier-type=可選擇計算依據：物品堆疊量、配方消耗量，或製作時間。
additional-paste-settings-options-combinator-multiplier-value=定義物流箱的請求量，取決於選擇的倍率類型。若選擇時間，則以製作秒數計算。
additional-paste-settings-options-sumup=若再次貼到已貼上設定的實體且此選項開啟，最終值會做加總；若關閉則直接覆寫。
additional-paste-settings-options-request-from-buffer=勾選後，貼到需求箱時會設定為可從緩衝箱請求。
additional-paste-settings-options-invert-buffer=勾選後，不再把原料貼到緩衝箱，而是貼上配方產物。永遠以產物堆疊量為基準。
additional-paste-settings-options-invert-buffer-multiplier-value=需要上方反向緩衝選項。依產物堆疊量定義緩衝箱的請求數量。
additional-paste-settings-paste-to-belt-enabled=允許把配方物品貼到輸送帶。
additional-paste-settings-switch_icon_format=預設為 [ img=class/name ]，啟用後切換為 [ class=name ]

