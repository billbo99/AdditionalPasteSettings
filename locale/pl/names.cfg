[controls-description]
additional-paste-settings-hotkey=Dla większości graczy powinno to być SHIFT + lewy przycisk myszy. To powinien być ZAWSZE skrót do wklejania ustawień na obiekty.
additional-paste-settings-hotkey-alt=Dla większości graczy powinno to być SHIFT + ALT + lewy przycisk myszy. Ten skrót powinien ustawiać 1/2 bieżącej wielkości stosu dla podajnika.

