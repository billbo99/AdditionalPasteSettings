[mod-setting-description]
additional-paste-settings-options-smart_filters=Inteligentne filtry: podczas pobierania z assemblera używa produktu jako filtra zamiast składników.
additional-paste-settings-options-disable_filters=Wyłącz filtry: blokuje ustawianie filtrów na podajnikach (domyślnie wanilia ustawia składniki jako filtry).
additional-paste-settings-options-inserter-filter-mode=Wybierz źródło filtra podajnika przy wklejaniu z assemblerów: tylko produkty, tylko składniki albo przełączanie między nimi.
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=Przy wklejaniu z assemblera na przystanek pociągu nazwy idą według receptury: dla każdego produktu format Załadunku i Rozładunku, a dla każdego składnika tylko Rozładunek. Gdy wyłączone, zachowanie jak przy wklejaniu ze skrzyni (mieszane przełączanie Załadunek/Rozładunek po jednej liście).
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=Wymaga opcji powyżej. Dodaje jedną nazwę stacji między produktami i składnikami: wszystkie wejścia receptury połączone w jeden ciąg (przydatne dla przystanków w stylu LTN). Potem nadal wykonywany jest zwykły krok Rozładunku dla każdego wejścia osobno.
additional-paste-settings-station_name_load=(__1__) zawiera grafikę przedmiotu, (__2__) zawiera nazwę przedmiotu
additional-paste-settings-station_name_unload=(__1__) zawiera grafikę przedmiotu, (__2__) zawiera nazwę przedmiotu
additional-paste-settings-station_name_ltn_all_inputs=(__1__) wszystkie wejścia jako ikony rich-text (oddzielone spacją); (__2__) nazwy wyświetlane oddzielone przecinkami. Używane tylko przy włączonym kroku grupowania LTN.
additional-paste-settings-se-rocket-landing-pad-name=(__1__) zawiera grafikę przedmiotu, (__2__) zawiera nazwę przedmiotu
additional-paste-settings-options-requester-multiplier-type=Pozwala wybrać sposób liczenia: według wielkości stosu przedmiotu, według zużycia w recepturze albo według czasu wytwarzania.
additional-paste-settings-options-requester-multiplier-value=Określa, ile ma być żądane dla skrzyń logistycznych, zależnie od wybranego typu mnożnika. Jeśli wybrano Czas, wartość jest liczona w sekundach produkcji.
additional-paste-settings-options-inserter-multiplier-type=Pozwala wybrać sposób liczenia: według wielkości stosu przedmiotu, według zużycia w recepturze albo według czasu wytwarzania.
additional-paste-settings-options-inserter-multiplier-value=Określa, ile ma być żądane dla skrzyń logistycznych, zależnie od wybranego typu mnożnika. Jeśli wybrano Czas, wartość jest liczona w sekundach produkcji.
additional-paste-settings-options-combinator-multiplier-type=Pozwala wybrać sposób liczenia: według wielkości stosu przedmiotu, według zużycia w recepturze albo według czasu wytwarzania.
additional-paste-settings-options-combinator-multiplier-value=Określa, ile ma być żądane dla skrzyń logistycznych, zależnie od wybranego typu mnożnika. Jeśli wybrano Czas, wartość jest liczona w sekundach produkcji.
additional-paste-settings-options-sumup=Jeśli po ponownym wklejeniu na obiekt z już wklejonymi ustawieniami opcja jest zaznaczona, wynikowa wartość będzie dodawana. Jeśli odznaczona, wartość zostanie po prostu nadpisana.
additional-paste-settings-options-request-from-buffer=Jeśli zaznaczone, skrzynie żądające będą pobierały z buforów podczas wklejania ustawień.
additional-paste-settings-options-invert-buffer=Jeśli zaznaczone, zamiast wklejać składniki do skrzyni buforowej, zostanie wklejony produkt receptury. Zawsze bazuje to na wielkości stosu produkowanego przedmiotu.
additional-paste-settings-options-invert-buffer-multiplier-value=Wymaga opcji odwrócenia bufora powyżej. Określa, ile ma być żądane dla skrzyń buforowych zależnie od wielkości produkowanego stosu.
additional-paste-settings-paste-to-belt-enabled=Pozwala wkleić przedmiot receptury na taśmociąg.
additional-paste-settings-switch_icon_format=Domyślnie jest [ img=class/name ], włączenie tej opcji przełącza na [ class=name ]

