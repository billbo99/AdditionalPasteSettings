[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings (Rozszerzone)

[mod-description]
AdditionalPasteSettings_CoreNest=Fork opublikowany osobno od oryginalnego Additional Paste Settings na portalu modów.\n\nDodaje dodatkowe ustawienia wklejania w grze (shift+PPM -> shift+LPM), takie jak łączenie żądań w skrzyniach logistycznych, ustawianie stałego mnożnika żądań, modyfikację domyślnego zachowania 30 sekund oraz wklejanie z assemblerów do podajników z ustawianiem warunku.
