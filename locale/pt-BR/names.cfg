[controls-description]
additional-paste-settings-hotkey=Para a maioria dos jogadores, isso deve ser SHIFT + clique esquerdo. Esse deve ser SEMPRE o atalho que cola configuracoes em entidades.
additional-paste-settings-hotkey-alt=Para a maioria dos jogadores, isso deve ser SHIFT + ALT + clique esquerdo. Essa tecla deve definir 1/2 da pilha atual em um inseridor.

