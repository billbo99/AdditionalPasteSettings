[mod-setting-description]
additional-paste-settings-options-smart_filters=Filtros inteligentes: ao copiar de uma montadora, use o produto como filtro em vez dos ingredientes.
additional-paste-settings-options-disable_filters=Desativar filtros: impede que filtros sejam definidos em inseridores (no vanilla, o padrao e usar ingredientes como filtros).
additional-paste-settings-options-inserter-filter-mode=Escolha a fonte do filtro do inseridor ao colar de montadoras: apenas produtos, apenas ingredientes, ou alternar entre ambos.
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=Ao colar de uma montadora para uma parada de trem, percorre nomes na ordem da receita: para cada produto aplica o formato de Carga e depois de Descarga; para cada ingrediente aplica apenas Descarga. Desativado: comportamento igual ao de colagem em baus (alternancia mista Carga/Descarga em uma lista combinada).
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=Requer a opcao acima. Insere um nome de estacao entre produtos e ingredientes: todas as entradas da receita combinadas em uma unica string (util para paradas estilo LTN). Depois disso, o passo normal de Descarga continua para cada entrada separadamente.
additional-paste-settings-station_name_load=(__1__) contem o grafico do item, (__2__) contem o nome do item
additional-paste-settings-station_name_unload=(__1__) contem o grafico do item, (__2__) contem o nome do item
additional-paste-settings-station_name_ltn_all_inputs=(__1__) todas as entradas como icones rich-text (separados por espaco); (__2__) nomes de exibicao separados por virgula. Usado apenas quando a etapa de agrupamento LTN esta ativada.
additional-paste-settings-se-rocket-landing-pad-name=(__1__) contem o grafico do item, (__2__) contem o nome do item
additional-paste-settings-options-requester-multiplier-type=Permite escolher o calculo por: tamanho de pilha do item; consumo da receita por tipo de item; ou tempo de fabricacao.
additional-paste-settings-options-requester-multiplier-value=Define quanto sera solicitado para baus logisticos, de acordo com o tipo de multiplicador escolhido. Se Tempo for escolhido, o valor sera em segundos de fabricacao.
additional-paste-settings-options-inserter-multiplier-type=Permite escolher o calculo por: tamanho de pilha do item; consumo da receita por tipo de item; ou tempo de fabricacao.
additional-paste-settings-options-inserter-multiplier-value=Define quanto sera solicitado para baus logisticos, de acordo com o tipo de multiplicador escolhido. Se Tempo for escolhido, o valor sera em segundos de fabricacao.
additional-paste-settings-options-combinator-multiplier-type=Permite escolher o calculo por: tamanho de pilha do item; consumo da receita por tipo de item; ou tempo de fabricacao.
additional-paste-settings-options-combinator-multiplier-value=Define quanto sera solicitado para baus logisticos, de acordo com o tipo de multiplicador escolhido. Se Tempo for escolhido, o valor sera em segundos de fabricacao.
additional-paste-settings-options-sumup=Se, ao colar novamente sobre uma entidade que ja tem configuracao colada, esta opcao estiver marcada, o valor final sera aditivo. Se desmarcada, apenas substitui o valor.
additional-paste-settings-options-request-from-buffer=Se marcado, define baus solicitantes para solicitar de buffers ao colar neles.
additional-paste-settings-options-invert-buffer=Se marcado, em vez de colar ingredientes no bau buffer, cola a saida da receita. Sempre baseado em quanto o item produzido empilha.
additional-paste-settings-options-invert-buffer-multiplier-value=Requer a opcao acima de inversao de buffer para funcionar. Define quanto sera solicitado para baus buffer, de acordo com quanto o item produzido empilha.
additional-paste-settings-paste-to-belt-enabled=Permite colar um item de receita em uma esteira.
additional-paste-settings-switch_icon_format=O padrao e [ img=class/name ], ao ativar esta opcao muda para [ class=name ]

