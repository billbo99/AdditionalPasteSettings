[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings (Estendido)

[mod-description]
AdditionalPasteSettings_CoreNest=Fork publicado separadamente do Additional Paste Settings original no portal de mods.\n\nAdiciona configuracoes extras de colagem para o jogo (shift+clique direito -> shift+clique esquerdo), como mesclar/combinar pedidos em baus logisticos, definir multiplicador fixo de pedido, modificar o comportamento vanilla de 30 segundos e permitir colar de montadoras para inseridores para definir uma condicao.