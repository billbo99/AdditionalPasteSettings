[controls-description]
additional-paste-settings-hotkey=Para la mayoria de jugadores, deberia ser MAYUS + clic izquierdo. Este debe ser SIEMPRE el atajo que pega configuraciones en entidades.
additional-paste-settings-hotkey-alt=Para la mayoria de jugadores, deberia ser MAYUS + ALT + clic izquierdo. Esta tecla debe establecer 1/2 de la pila actual en un insertor.

