[mod-setting-description]
additional-paste-settings-options-smart_filters=Filtros inteligentes: al copiar desde una maquina de ensamblaje, usa el producto como filtro en lugar de los ingredientes.
additional-paste-settings-options-disable_filters=Desactivar filtros: evita que se establezcan filtros en insertores (el comportamiento vanilla por defecto es usar ingredientes como filtros).
additional-paste-settings-options-inserter-filter-mode=Elige la fuente del filtro del insertor al pegar desde ensambladoras: solo productos, solo ingredientes o alternar entre ambos.
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=Al pegar desde una ensambladora en una parada de tren, recorre nombres segun el orden de la receta: para cada producto aplica formato de Carga y luego de Descarga; para cada ingrediente aplica solo Descarga. Si esta desactivado, el comportamiento coincide con pegar desde cofres (alternancia mixta Carga/Descarga en una sola lista combinada).
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=Requiere la opcion anterior. Inserta un nombre de estacion entre productos e ingredientes: todas las entradas de receta combinadas en una sola cadena (util para paradas estilo LTN). Despues, el paso normal de Descarga se aplica por separado a cada entrada.
additional-paste-settings-station_name_load=(__1__) contiene el grafico del item, (__2__) contiene el nombre del item
additional-paste-settings-station_name_unload=(__1__) contiene el grafico del item, (__2__) contiene el nombre del item
additional-paste-settings-station_name_ltn_all_inputs=(__1__) todas las entradas como iconos rich-text (separados por espacios); (__2__) nombres visibles separados por comas. Solo se usa cuando esta activado el paso de agrupado estilo LTN.
additional-paste-settings-se-rocket-landing-pad-name=(__1__) contiene el grafico del item, (__2__) contiene el nombre del item
additional-paste-settings-options-requester-multiplier-type=Permite elegir el calculo segun: tamano de pila del item, consumo de receta por tipo de item, o tiempo de fabricacion.
additional-paste-settings-options-requester-multiplier-value=Define cuanto se solicitara para cofres logisticos, segun el tipo de multiplicador elegido. Si se elige Tiempo, se mide en segundos de fabricacion.
additional-paste-settings-options-inserter-multiplier-type=Permite elegir el calculo segun: tamano de pila del item, consumo de receta por tipo de item, o tiempo de fabricacion.
additional-paste-settings-options-inserter-multiplier-value=Define cuanto se solicitara para cofres logisticos, segun el tipo de multiplicador elegido. Si se elige Tiempo, se mide en segundos de fabricacion.
additional-paste-settings-options-combinator-multiplier-type=Permite elegir el calculo segun: tamano de pila del item, consumo de receta por tipo de item, o tiempo de fabricacion.
additional-paste-settings-options-combinator-multiplier-value=Define cuanto se solicitara para cofres logisticos, segun el tipo de multiplicador elegido. Si se elige Tiempo, se mide en segundos de fabricacion.
additional-paste-settings-options-sumup=Si al volver a pegar sobre una entidad que ya tiene configuracion pegada esta opcion esta activada, el valor final sera aditivo. Si esta desactivada, simplemente reemplazara el valor.
additional-paste-settings-options-request-from-buffer=Si esta activado, los cofres solicitadores pediran desde cofres buffer al pegar sobre ellos.
additional-paste-settings-options-invert-buffer=Si esta activado, en lugar de pegar ingredientes en el cofre buffer, pegara la salida de la receta. Siempre se basa en cuanto apila el item producido.
additional-paste-settings-options-invert-buffer-multiplier-value=Requiere la opcion anterior de invertir buffer. Define cuanto se solicitara para cofres buffer segun cuanto apila el item producido.
additional-paste-settings-paste-to-belt-enabled=Permite pegar un item de receta en una cinta.
additional-paste-settings-switch_icon_format=Por defecto es [ img=class/name ], al activar esta opcion cambia a [ class=name ]

