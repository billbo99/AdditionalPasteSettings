[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings (Extendido)

[mod-description]
AdditionalPasteSettings_CoreNest=Fork publicado por separado del Additional Paste Settings original en el portal de mods.\n\nAgrega ajustes de pegado adicionales para el juego (shift+clic derecho -> shift+clic izquierdo), como fusionar/combinar solicitudes en cofres logisticos, fijar un multiplicador de solicitud, modificar el comportamiento vanilla de 30 segundos y permitir pegar desde ensambladoras a insertores para establecerles una condicion.