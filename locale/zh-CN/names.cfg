[controls]
additional-paste-settings-hotkey=额外粘贴快捷键
additional-paste-settings-hotkey-alt=额外粘贴快捷键（Alt模式）

[controls-description]
additional-paste-settings-hotkey=对大多数玩家来说，这应该是 SHIFT + 左键点击。这个快捷键应始终用于把设置粘贴到实体上。
additional-paste-settings-hotkey-alt=对大多数玩家来说，这应该是 SHIFT + ALT + 左键点击。这个快捷键应将机械臂当前堆叠数量设置为 1/2。

[mod-setting-name]
additional-paste-settings-paste-clear-inserter-filter-on-paste-over=从同一机械臂粘贴时重置筛选器
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=火车站（来自组装机）：产物装载/卸载，然后输入物卸载
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=火车站（来自组装机）：LTN风格将所有输入合并到一个名称（位于产物与逐项卸载之间）
additional-paste-settings-station_name_load=车站装载名称格式
additional-paste-settings-station_name_unload=车站卸载名称格式
additional-paste-settings-station_name_ltn_all_inputs=火车站：将配方全部输入合并到一个名称（LTN风格）
additional-paste-settings-se-rocket-landing-pad-name=SE 货运着陆平台名称格式
additional-paste-settings-options-smart_filters=机械臂：智能筛选
additional-paste-settings-options-disable_filters=机械臂：禁用筛选
additional-paste-settings-options-inserter-filter-mode=机械臂：筛选来源模式
additional-paste-settings-options-requester-multiplier-type=物流箱：倍数类型
additional-paste-settings-options-requester-multiplier-value=物流箱：倍数数值
