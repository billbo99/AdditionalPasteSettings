additional-paste-settings-options-inserter-multiplier-value=机械臂：倍数数值
additional-paste-settings-options-transport_belt-multiplier-type=运输带：倍数类型
additional-paste-settings-options-transport_belt-multiplier-value=运输带：倍数数值
