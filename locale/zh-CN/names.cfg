[mod-setting-description]
additional-paste-settings-options-smart_filters=智能筛选：若从组装机拉取，使用产物作为筛选而不是配方输入。
additional-paste-settings-options-disable_filters=禁用筛选：阻止给机械臂设置筛选（原版默认行为是将输入物设置为筛选）。
additional-paste-settings-options-inserter-filter-mode=选择从组装机粘贴时机械臂筛选来源：仅产物、仅输入物，或在两者间切换。
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=从组装机粘贴到火车站时，名称按配方顺序循环：每个产物依次应用装载格式和卸载格式；每个输入物仅应用卸载。关闭时行为与箱子粘贴一致（在合并的产物+输入物列表上混合切换装载/卸载）。
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=需要启用上方选项。在产物与输入物之间插入一个站名：将所有配方输入合并为一个字符串（适合 LTN 风格车站）。之后仍会对每个输入物分别执行常规卸载步骤。
additional-paste-settings-station_name_load=(__1__) 为物品图标，(__2__) 为物品名称
additional-paste-settings-station_name_unload=(__1__) 为物品图标，(__2__) 为物品名称
additional-paste-settings-station_name_ltn_all_inputs=(__1__) 为所有输入的 rich-text 图标（空格分隔）；(__2__) 为逗号分隔的显示名称。仅在启用 LTN 合并步骤时使用。
additional-paste-settings-se-rocket-landing-pad-name=(__1__) 为物品图标，(__2__) 为物品名称
additional-paste-settings-options-requester-multiplier-type=可按以下方式计算：物品堆叠大小、配方消耗量、或制作耗时。
additional-paste-settings-options-requester-multiplier-value=定义物流箱请求数量，取决于所选倍数类型。若选择时间，则以制作秒数为单位。
additional-paste-settings-options-inserter-multiplier-type=可按以下方式计算：物品堆叠大小、配方消耗量、或制作耗时。
additional-paste-settings-options-inserter-multiplier-value=定义物流箱请求数量，取决于所选倍数类型。若选择时间，则以制作秒数为单位。
additional-paste-settings-options-combinator-multiplier-type=可按以下方式计算：物品堆叠大小、配方消耗量、或制作耗时。
additional-paste-settings-options-combinator-multiplier-value=定义物流箱请求数量，取决于所选倍数类型。若选择时间，则以制作秒数为单位。
additional-paste-settings-options-sumup=若再次粘贴到已设置过的实体并启用此项，最终值将执行累加；若关闭则直接覆盖。
additional-paste-settings-options-request-from-buffer=若启用，粘贴到请求箱时会设置为可从缓冲箱请求。
additional-paste-settings-options-invert-buffer=若启用，不再向缓冲箱粘贴输入物，而是粘贴配方产物。始终基于产物的堆叠大小。
additional-paste-settings-options-invert-buffer-multiplier-value=需要先启用上方反向缓冲选项。定义缓冲箱请求数量，取决于产物的堆叠大小。
additional-paste-settings-paste-to-belt-enabled=允许将配方物品粘贴到运输带。
additional-paste-settings-switch_icon_format=默认是 [ img=class/name ]，启用后切换为 [ class=name ]

