[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings（扩展）

[mod-description]
AdditionalPasteSettings_CoreNest=这是一个与原版 Additional Paste Settings 分开发布在模组门户上的分支。\n\n为游戏添加额外的粘贴设置（shift+右键 -> shift+左键），例如在物流箱中合并请求、设置固定请求倍数、修改原版 30 秒行为，并允许将组装机的配方粘贴到机械臂以设置条件。