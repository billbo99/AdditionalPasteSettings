additional-paste-settings-hotkey=ほとんどのプレイヤーでは SHIFT + 左クリック が推奨です。これはエンティティへ設定を貼り付けるための常用ホットキーです。
additional-paste-settings-hotkey-alt=ほとんどのプレイヤーでは SHIFT + ALT + 左クリック が推奨です。このキーはインサーターの現在スタック量を 1/2 にします。

