[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings（拡張）

[mod-description]
AdditionalPasteSettings_CoreNest=Modポータル上の元の Additional Paste Settings とは別に公開されたフォークです。\n\nゲームに追加の貼り付け設定（shift+右クリック -> shift+左クリック）を追加します。物流チェストの要求統合、固定倍率設定、バニラの30秒挙動の調整、組立機からインサーターへの貼り付けで条件設定などが可能です。