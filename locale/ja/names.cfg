[mod-setting-description]
additional-paste-settings-options-smart_filters=スマートフィルター: 組立機から取得する場合、材料ではなく生成物をフィルターとして使います。
additional-paste-settings-options-disable_filters=フィルター無効化: インサーターへのフィルター設定を無効化します（バニラ既定では材料がフィルターになります）。
additional-paste-settings-options-inserter-filter-mode=組立機から貼り付ける際のインサーターのフィルター元を選択します: 生成物のみ、材料のみ、または両方を切替。
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=組立機から駅へ貼り付ける際、レシピ順で名前を循環します: 各生成物に積み込み形式→荷下ろし形式を適用し、各材料には荷下ろしのみを適用します。無効時はチェスト貼り付けと同じ挙動になります。
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=上記オプションが必要です。生成物と材料の間に1つの駅名を挿入し、レシピ入力を1つの文字列にまとめます（LTN方式向け）。その後、通常の荷下ろし処理が各入力に対して実行されます。
additional-paste-settings-station_name_load=(__1__) はアイテム画像、(__2__) はアイテム名です
additional-paste-settings-station_name_unload=(__1__) はアイテム画像、(__2__) はアイテム名です
additional-paste-settings-station_name_ltn_all_inputs=(__1__) は全入力の rich-text アイコン（空白区切り）、(__2__) は表示名（カンマ区切り）。LTNまとめステップ有効時のみ使用。
additional-paste-settings-se-rocket-landing-pad-name=(__1__) はアイテム画像、(__2__) はアイテム名です
additional-paste-settings-options-requester-multiplier-type=計算方法を選択します: アイテムのスタック量、レシピ消費量、または製作時間。
additional-paste-settings-options-requester-multiplier-value=物流チェストの要求量を定義します。選択した倍率タイプに依存します。時間を選んだ場合は製作秒数です。
additional-paste-settings-options-inserter-multiplier-type=計算方法を選択します: アイテムのスタック量、レシピ消費量、または製作時間。
additional-paste-settings-options-inserter-multiplier-value=物流チェストの要求量を定義します。選択した倍率タイプに依存します。時間を選んだ場合は製作秒数です。
additional-paste-settings-options-combinator-multiplier-type=計算方法を選択します: アイテムのスタック量、レシピ消費量、または製作時間。
additional-paste-settings-options-combinator-multiplier-value=物流チェストの要求量を定義します。選択した倍率タイプに依存します。時間を選んだ場合は製作秒数です。
additional-paste-settings-options-sumup=既に設定があるエンティティへ再貼り付けしたとき、この項目を有効にすると最終値を加算します。無効なら上書きします。
additional-paste-settings-options-request-from-buffer=有効時、要求チェストへ貼り付けるとバッファーチェストから要求する設定にします。
additional-paste-settings-options-invert-buffer=有効時、バッファーチェストへ材料ではなくレシピ生成物を貼り付けます。常に生成物のスタック量を基準にします。
additional-paste-settings-options-invert-buffer-multiplier-value=上記の反転バッファーが必要です。生成物のスタック量に応じてバッファーチェストの要求量を定義します。
additional-paste-settings-paste-to-belt-enabled=レシピアイテムをベルトに貼り付けできます。
additional-paste-settings-switch_icon_format=既定は [ img=class/name ]。有効化で [ class=name ] に切替えます

