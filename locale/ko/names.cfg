[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings (확장)

[mod-description]
AdditionalPasteSettings_CoreNest=모드 포털의 원본 Additional Paste Settings와 별도로 배포된 포크입니다.\n\n게임에 추가 붙여넣기 설정(shift+우클릭 -> shift+좌클릭)을 제공합니다. 물류 상자 요청 병합, 고정 요청 배수 설정, 기본 30초 동작 조정, 조립기에서 인서터로 붙여넣어 조건 설정 등이 가능합니다.