[controls-description]
additional-paste-settings-hotkey=대부분의 사용자에게는 SHIFT + 왼쪽 클릭이 적합합니다. 이 키는 엔티티에 설정을 붙여넣는 기본 단축키로 사용해야 합니다.
additional-paste-settings-hotkey-alt=대부분의 사용자에게는 SHIFT + ALT + 왼쪽 클릭이 적합합니다. 이 키는 인서터의 현재 스택 수량을 1/2로 설정합니다.

