[mod-setting-description]
additional-paste-settings-options-smart_filters=스마트 필터: 조립기에서 가져올 때 재료 대신 산출물을 필터로 사용합니다.
additional-paste-settings-options-disable_filters=필터 비활성화: 인서터에 필터가 설정되지 않도록 합니다 (기본 바닐라 동작은 재료를 필터로 설정).
additional-paste-settings-options-inserter-filter-mode=조립기에서 붙여넣을 때 인서터 필터 소스를 선택합니다: 산출물만, 재료만, 또는 둘 사이 전환.
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=조립기에서 기차 정차장으로 붙여넣을 때, 레시피 순서대로 이름을 순환합니다: 각 산출물에 적재 형식 후 하역 형식을 적용하고, 각 재료에는 하역만 적용합니다. 꺼져 있으면 상자 붙여넣기와 같은 동작입니다.
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=위 옵션이 필요합니다. 산출물과 재료 사이에 하나의 정차장 이름을 삽입해 모든 레시피 입력을 하나의 문자열로 묶습니다 (LTN 스타일 정차장에 유용). 이후 각 입력에 대해 일반 하역 단계가 실행됩니다.
additional-paste-settings-station_name_load=(__1__)는 아이템 그래픽, (__2__)는 아이템 이름입니다
additional-paste-settings-station_name_unload=(__1__)는 아이템 그래픽, (__2__)는 아이템 이름입니다
additional-paste-settings-station_name_ltn_all_inputs=(__1__)는 모든 입력의 rich-text 아이콘(공백 구분), (__2__)는 쉼표 구분 표시 이름입니다. LTN 묶기 단계가 활성화된 경우에만 사용됩니다.
additional-paste-settings-se-rocket-landing-pad-name=(__1__)는 아이템 그래픽, (__2__)는 아이템 이름입니다
additional-paste-settings-options-requester-multiplier-type=계산 방식을 선택합니다: 아이템 스택 크기, 레시피 소비량, 또는 제작 시간.
additional-paste-settings-options-requester-multiplier-value=선택한 배수 유형에 따라 물류 상자의 요청량을 정의합니다. 시간이 선택되면 제작 초 단위입니다.
additional-paste-settings-options-inserter-multiplier-type=계산 방식을 선택합니다: 아이템 스택 크기, 레시피 소비량, 또는 제작 시간.
additional-paste-settings-options-inserter-multiplier-value=선택한 배수 유형에 따라 물류 상자의 요청량을 정의합니다. 시간이 선택되면 제작 초 단위입니다.
additional-paste-settings-options-combinator-multiplier-type=계산 방식을 선택합니다: 아이템 스택 크기, 레시피 소비량, 또는 제작 시간.
additional-paste-settings-options-combinator-multiplier-value=선택한 배수 유형에 따라 물류 상자의 요청량을 정의합니다. 시간이 선택되면 제작 초 단위입니다.
additional-paste-settings-options-sumup=이미 설정이 붙여진 엔티티에 다시 붙여넣을 때 이 옵션이 켜져 있으면 최종값을 누적합니다. 꺼져 있으면 값이 덮어써집니다.
additional-paste-settings-options-request-from-buffer=체크하면 요청 상자에 붙여넣을 때 버퍼 상자에서 요청하도록 설정합니다.
additional-paste-settings-options-invert-buffer=체크하면 버퍼 상자에 재료 대신 레시피 산출물을 붙여넣습니다. 항상 생산 아이템의 스택 크기를 기준으로 합니다.
additional-paste-settings-options-invert-buffer-multiplier-value=위의 버퍼 반전 옵션이 필요합니다. 생산 아이템의 스택 크기에 따라 버퍼 상자 요청량을 정의합니다.
additional-paste-settings-paste-to-belt-enabled=레시피 아이템을 벨트에 붙여넣을 수 있습니다.
additional-paste-settings-switch_icon_format=기본값은 [ img=class/name ]이며, 활성화하면 [ class=name ]로 전환됩니다

