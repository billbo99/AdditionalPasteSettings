[controls-description]
additional-paste-settings-hotkey=Pour la plupart des joueurs, cela devrait etre MAJ + clic gauche. Ce doit TOUJOURS etre le raccourci qui colle les reglages sur les entites.
additional-paste-settings-hotkey-alt=Pour la plupart des joueurs, cela devrait etre MAJ + ALT + clic gauche. Cette touche doit definir 1/2 de la taille de pile actuelle sur un inserteur.

