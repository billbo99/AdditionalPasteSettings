[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings (Etendu)

[mod-description]
AdditionalPasteSettings_CoreNest=Fork publie separement de l'original Additional Paste Settings sur le portail des mods.\n\nAjoute des reglages de collage supplementaires dans le jeu (shift+clic droit -> shift+clic gauche), comme la fusion des demandes dans les coffres logistiques, un multiplicateur fixe, la modification du comportement vanilla de 30 secondes, et le collage des recettes d'assembleuses vers les inserteurs avec condition.
