[mod-setting-description]
additional-paste-settings-options-smart_filters=Filtres intelligents: en copiant depuis une assembleuse, utilise le produit comme filtre au lieu des ingredients.
additional-paste-settings-options-disable_filters=Desactiver les filtres: empeche la definition de filtres sur les inserteurs (le comportement vanilla definit les ingredients comme filtres).
additional-paste-settings-options-inserter-filter-mode=Choisissez la source de filtre des inserteurs lors d'un collage depuis des assembleuses: seulement les produits, seulement les ingredients, ou alternance entre les deux.
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=Lors d'un collage d'une assembleuse vers un arret de train, les noms suivent l'ordre de recette: pour chaque produit, applique le format Chargement puis Dechargement; puis pour chaque ingredient, applique Dechargement uniquement. Desactive: comportement identique au collage depuis coffre (alternance Charge/Decharge sur une liste combinee).
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=Necessite l'option ci-dessus. Insere un nom de station entre produits et ingredients: toutes les entrees de recette regroupees dans une seule chaine (utile pour les arrets style LTN). Ensuite, l'etape Dechargement normale s'applique a chaque entree separement.
additional-paste-settings-station_name_load=(__1__) contient le graphique de l'objet, (__2__) contient le nom de l'objet
additional-paste-settings-station_name_unload=(__1__) contient le graphique de l'objet, (__2__) contient le nom de l'objet
additional-paste-settings-station_name_ltn_all_inputs=(__1__) toutes les entrees en icones rich-text (separees par espaces); (__2__) noms affiches separes par virgules. Utilise uniquement quand l'etape de regroupement LTN est activee.
additional-paste-settings-se-rocket-landing-pad-name=(__1__) contient le graphique de l'objet, (__2__) contient le nom de l'objet
additional-paste-settings-options-requester-multiplier-type=Permet de choisir le calcul selon la taille de pile, la consommation de recette, ou le temps de fabrication.
additional-paste-settings-options-requester-multiplier-value=Definit la quantite demandee pour les coffres logistiques selon le type de multiplicateur choisi. Si Temps est choisi, la valeur est en secondes de fabrication.
additional-paste-settings-options-inserter-multiplier-type=Permet de choisir le calcul selon la taille de pile, la consommation de recette, ou le temps de fabrication.
additional-paste-settings-options-inserter-multiplier-value=Definit la quantite demandee pour les coffres logistiques selon le type de multiplicateur choisi. Si Temps est choisi, la valeur est en secondes de fabrication.
additional-paste-settings-options-combinator-multiplier-type=Permet de choisir le calcul selon la taille de pile, la consommation de recette, ou le temps de fabrication.
additional-paste-settings-options-combinator-multiplier-value=Definit la quantite demandee pour les coffres logistiques selon le type de multiplicateur choisi. Si Temps est choisi, la valeur est en secondes de fabrication.
additional-paste-settings-options-sumup=Si active lors d'un nouveau collage sur une entite deja configuree, les valeurs finales sont additionnees. Si desactive, la valeur est simplement remplacee.
additional-paste-settings-options-request-from-buffer=Si active, les coffres demandeurs demanderont depuis les coffres tampons lors du collage.
additional-paste-settings-options-invert-buffer=Si active, au lieu de coller les ingredients dans le coffre tampon, colle le produit de la recette. Cela se base toujours sur la taille de pile de l'objet produit.
additional-paste-settings-options-invert-buffer-multiplier-value=Necessite l'option d'inversion du tampon ci-dessus. Definit la quantite demandee pour les coffres tampons selon la taille de pile de l'objet produit.
additional-paste-settings-paste-to-belt-enabled=Permet de coller un objet de recette sur un convoyeur.
additional-paste-settings-switch_icon_format=Par defaut: [ img=class/name ], activer cette option bascule vers [ class=name ]

