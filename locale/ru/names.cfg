[controls-description]
additional-paste-settings-hotkey=Для большинства пользователей это должен быть SHIFT + щелчок левой кнопкой мыши. Это ВСЕГДА должна быть горячая клавиша, которая вставляет настройки в сущности.
additional-paste-settings-hotkey-alt=Для большинства пользователей это должен быть SHIFT + ALT + щелчок левой кнопкой мыши. Этот ключ должен составлять 1/2 текущего объема стека на устройстве вставки.

