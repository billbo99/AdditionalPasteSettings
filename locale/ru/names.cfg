[mod-name]
AdditionalPasteSettings=Additional Paste Settings Fixed

[mod-description]
AdditionalPasteSettings="Доп. настройки вставки/копирования".\nДобавляет дополнительные настройки вставки для игры (shift+щелчок правой кнопкой мыши -> Shift+щелчок левой кнопкой мыши), такие как слияние/объединение запросов в логистических сундуках, установка фиксированного множителя запроса, позволяет изменять 30-секундное ванильное поведение и разрешать вставку из ассемблеров в манипуляторы, чтобы установить для них условие.