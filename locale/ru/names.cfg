[mod-setting-description]
additional-paste-settings-options-smart_filters=Умный манипулятор: при извлечении из сборочной машины используйте в качестве фильтра продукт, а не ингредиенты.
additional-paste-settings-options-disable_filters=Отключить фильтры: отключает фильтры, устанавливаемые на манипуляторах (ванильное поведение по умолчанию для манипуляторов заключается в установке ингредиентов в качестве фильтров).
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=При вставке из сборочной машины на остановку имена идут по рецепту: для каждого продукта — формат загрузки, затем разгрузки; для каждого ингредиента — только разгрузка. Выключено — как при вставке из сундука (чередование Load/Unload по общему списку).
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=Требуется опция выше. Между продуктами и ингредиентами добавляется одно имя со всеми входами рецепта (удобно для остановок в стиле LTN). Затем по-прежнему идёт разгрузка по каждому входу отдельно.
additional-paste-settings-station_name_load=(__1__) содержит графику предмета, (__2__) содержит название предмета
additional-paste-settings-station_name_unload=(__1__) содержит графику предмета, (__2__) содержит название предмета
additional-paste-settings-station_name_ltn_all_inputs=(__1__) все входы как иконки rich-text через пробел; (__2__) названия через запятую. Только при включённом шаге «все входы в одном имени».
additional-paste-settings-se-rocket-landing-pad-name=(__1__) содержит графику предмета, (__2__) содержит название предмета
additional-paste-settings-options-requester-multiplier-type=Позволяет выбрать способ учета: по размеру стопки предмета; по объему рецепта; или по времени крафта.
additional-paste-settings-options-requester-multiplier-value=Определяет, сколько будет запрошено для логистических сундуков, в зависимости от выбранного типа множителя. Если было выбрано Время, то это будет в секундах, потраченных на крафт.
additional-paste-settings-options-inserter-multiplier-type=Позволяет выбрать способ учета: по размеру стопки предмета; по объему рецепта; или по времени крафта
additional-paste-settings-options-inserter-multiplier-value=Определяет, сколько будет запрошено для логистических сундуков, в зависимости от выбранного типа множителя. Если было выбрано Время, то это будет в секундах, потраченных на крафт.
additional-paste-settings-options-combinator-multiplier-type=Позволяет выбрать способ учета: по размеру стопки предмета; по объему рецепта; или по времени крафта
additional-paste-settings-options-combinator-multiplier-value=Определяет, сколько будет запрошено для логистических сундуков, в зависимости от выбранного типа множителя. Если было выбрано Время, то это будет в секундах, потраченных на крафт.
additional-paste-settings-options-sumup=Если флажок установлен, повторная вставка параметров добавляет их к уже существующим значениям. Если флажок не установлен, повторная вставка заменяет текущие значения на новые.
additional-paste-settings-options-request-from-buffer=Если этот флажок установлен, сундуки запроса будут настроены на получение предметов из буферных сундуков при вставке в них.
additional-paste-settings-options-invert-buffer=Если флажок установлен, вместо того, чтобы вставлять ингредиенты в буферный сундук, он будет вставлять вывод рецепта. Это всегда зависит от того, сколько предметов в стеке.
additional-paste-settings-options-invert-buffer-multiplier-value=Требуется указанный выше параметр для работы механики инвертирования буфера. Определяет, сколько будет запрошено для буферных сундуков, в зависимости от того, сколько предметов в стеке.
additional-paste-settings-paste-to-belt-enabled=Позволяет вставить рецепт предмета на ленту конвеера.
additional-paste-settings-switch_icon_format=Значение по умолчанию [ img=class/name ], включение этого параметра переключается на [ class=name ]

