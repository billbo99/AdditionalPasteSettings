[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings (Erweitert)

[mod-description]
AdditionalPasteSettings_CoreNest=Fork getrennt vom originalen Additional Paste Settings auf dem Mod-Portal veroeffentlicht.\n\nFuegt dem Spiel zusaetzliche Einfuege-Einstellungen hinzu (shift+rechtsklick -> shift+linksklick), z. B. Zusammenfuehren von Anforderungen in Logistikkisten, fester Multiplikator, Anpassung des 30-Sekunden-Vanilla-Verhaltens sowie Einfuegen von Assemblern in Greifarme mit Bedingungssetzung.
