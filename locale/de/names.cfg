[mod-setting-description]
additional-paste-settings-options-smart_filters=Intelligente Filter: Beim Kopieren von einer Montagemaschine wird das Produkt statt der Zutaten als Filter verwendet.
additional-paste-settings-options-disable_filters=Filter deaktivieren: Verhindert das Setzen von Filtern auf Greifarmen (Vanilla setzt standardmaessig Zutaten als Filter).
additional-paste-settings-options-inserter-filter-mode=Waehle die Filterquelle fuer Greifarme beim Einfuegen aus Montagemaschinen: nur Produkte, nur Zutaten oder Umschalten zwischen beiden.
additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=Beim Einfuegen von einer Montagemaschine auf einen Zughalt werden Namen in Rezeptreihenfolge durchlaufen: fuer jedes Produkt zuerst Lade- dann Entladeformat; fuer jede Zutat nur Entladen. Ausgeschaltet entspricht das dem Kistenverhalten (gemischtes Laden/Entladen ueber eine kombinierte Liste).
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=Erfordert die Option oben. Fuegt einen Stationsnamen zwischen Produkten und Zutaten ein: alle Rezept-Eingaben in einem einzigen String (nuetzlich fuer LTN-Style-Halte). Danach folgt wie gewohnt der Entlade-Schritt pro Eingabe.
additional-paste-settings-station_name_load=(__1__) enthaelt Item-Grafik, (__2__) enthaelt Item-Name
additional-paste-settings-station_name_unload=(__1__) enthaelt Item-Grafik, (__2__) enthaelt Item-Name
additional-paste-settings-station_name_ltn_all_inputs=(__1__) alle Eingaben als Rich-Text-Icons (durch Leerzeichen getrennt); (__2__) Anzeigenamen komma-getrennt. Nur verwendet, wenn der LTN-Buendel-Schritt aktiv ist.
additional-paste-settings-se-rocket-landing-pad-name=(__1__) enthaelt Item-Grafik, (__2__) enthaelt Item-Name
additional-paste-settings-options-requester-multiplier-type=Ermoeglicht die Berechnung nach Stapelgroesse, nach Rezeptverbrauch oder nach Herstellungszeit.
additional-paste-settings-options-requester-multiplier-value=Definiert die Anforderungsmenge fuer Logistikkisten, abhaengig vom gewaehlten Multiplikator-Typ. Bei Zeit wird in Herstellungssekunden gerechnet.
additional-paste-settings-options-inserter-multiplier-type=Ermoeglicht die Berechnung nach Stapelgroesse, nach Rezeptverbrauch oder nach Herstellungszeit.
additional-paste-settings-options-inserter-multiplier-value=Definiert die Anforderungsmenge fuer Logistikkisten, abhaengig vom gewaehlten Multiplikator-Typ. Bei Zeit wird in Herstellungssekunden gerechnet.
additional-paste-settings-options-combinator-multiplier-type=Ermoeglicht die Berechnung nach Stapelgroesse, nach Rezeptverbrauch oder nach Herstellungszeit.
additional-paste-settings-options-combinator-multiplier-value=Definiert die Anforderungsmenge fuer Logistikkisten, abhaengig vom gewaehlten Multiplikator-Typ. Bei Zeit wird in Herstellungssekunden gerechnet.
additional-paste-settings-options-sumup=Wenn beim erneuten Einfuegen auf eine bereits konfigurierte Entitaet aktiviert, werden Werte addiert. Wenn deaktiviert, werden Werte ersetzt.
additional-paste-settings-options-request-from-buffer=Wenn aktiviert, fordern Anforderungskisten beim Einfuegen aus Pufferkisten an.
additional-paste-settings-options-invert-buffer=Wenn aktiviert, wird statt Zutaten das Rezeptprodukt in die Pufferkiste eingefuegt. Das basiert immer auf der Stapelgroesse des erzeugten Items.
additional-paste-settings-options-invert-buffer-multiplier-value=Erfordert die Invert-Buffer-Option oben. Definiert die Anforderungsmenge fuer Pufferkisten entsprechend der Stapelgroesse des erzeugten Items.
additional-paste-settings-paste-to-belt-enabled=Erlaubt das Einfuegen eines Rezept-Items auf ein Foerderband.
additional-paste-settings-switch_icon_format=Standard ist [ img=class/name ], aktivieren schaltet auf [ class=name ]

