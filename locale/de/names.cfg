[controls-description]
additional-paste-settings-hotkey=Fuer die meisten Spieler sollte das SHIFT + Linksklick sein. Das sollte IMMER der Hotkey sein, der Einstellungen auf Entitaeten einfuegt.
additional-paste-settings-hotkey-alt=Fuer die meisten Spieler sollte das SHIFT + ALT + Linksklick sein. Diese Taste sollte bei Greifarmen 1/2 der aktuellen Stapelgroesse setzen.

